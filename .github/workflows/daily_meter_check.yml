name: Daily NESCO Usage Tracker

on:
  schedule:
    - cron: '0 19 * * *'   # 1:00 AM BD (UTC 7:00 PM previous day)
    - cron: '0 21 * * *'   # 3:00 AM BD (UTC 9:00 PM previous day)
    - cron: '0 0 * * *'    # 6:00 AM BD (UTC 12:00 AM same day)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  track-bill:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install requests beautifulsoup4 pytz

      - name: Run Script
        run: python app.py

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add meter_history.json
          if ! git diff --staged --quiet; then
            git commit -m "Update Data: $(date)"
            git push
          else
            echo "No changes in data."
          fi
