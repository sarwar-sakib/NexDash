<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NESCO Meter Dashboard</title>
    <style>
        /* আপনার আগের CSS – অপরিবর্তিত */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #121212;
            color: #eee;
            padding: 20px;
            min-height: 100vh;
        }
        .dashboard-header {
            text-align: left;
            margin-bottom: 30px;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
            padding: 0 10px;
        }
        .dashboard-header h1 {
            color: #4db8ff;
            font-weight: 600;
            font-size: 28px;
            letter-spacing: 1px;
        }
        .dashboard-header p {
            color: #aaa;
            font-size: 14px;
            margin-top: 4px;
        }
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .card {
            background: #1e1e1e;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            border: 1px solid #333;
            transition: transform 0.1s ease;
        }
        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.7);
        }
        .meter-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }
        .meter-title {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
        }
        .meter-number {
            font-size: 20px;
            font-weight: 700;
            color: #aaa;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .copy-btn {
            background: transparent;
            border: none;
            color: #4db8ff;
            font-size: 18px;
            cursor: pointer;
            padding: 0 4px;
            transition: color 0.2s;
        }
        .copy-btn:hover {
            color: #fff;
        }
        .copy-btn:active {
            transform: scale(0.9);
        }
        .balance-amount {
            font-size: 32px;
            font-weight: 700;
            color: #2ecc71;
            margin: 6px 0;
        }
        .meta-row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #ccc;
            background: #2a2a2a;
            padding: 8px 12px;
            border-radius: 8px;
            margin: 8px 0 12px 0;
        }
        .meta-row span {
            display: inline-block;
        }
        .usage-badge {
            display: inline-block;
            background: #ffebee;
            color: #c62828;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
        }
        .chart-container {
            margin-top: 12px;
            height: 160px;
            position: relative;
        }
        .chart-container canvas {
            width: 100% !important;
            height: 100% !important;
        }
        .no-data {
            color: #888;
            font-size: 14px;
            text-align: center;
            padding: 20px 0;
        }
        .last-run-time {
            font-size: 12px;
            color: #999;
            margin-top: 12px;
            text-align: right;
            border-top: 1px solid #333;
            padding-top: 10px;
        }
        @media (max-width: 600px) {
            .card-grid {
                grid-template-columns: 1fr;
            }
            .meter-header {
                flex-wrap: wrap;
                gap: 4px;
            }
            .meter-number {
                font-size: 16px;
            }
            .meter-title {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>

    <div class="dashboard-header">
        <h1>⚡ NESCO Meter Dashboard</h1>
        <p>সর্বশেষ আপডেট: <span id="globalUpdateTime">Loading...</span></p>
    </div>

    <div class="card-grid" id="cardContainer">
        <!-- Cards injected here -->
    </div>

    <!-- Chart.js v2.9.4 + DataLabels Plugin -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@2.9.4/dist/Chart.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@0.7.0/dist/chartjs-plugin-datalabels.min.js"></script>

    <script>
        Chart.plugins.register(ChartDataLabels);

        const HISTORY_URL = "meter_history.json";
        const CONFIG_URL = "meter_config.json";
        const CACHE_BUST = '?v=' + new Date().getTime();
        let allCharts = [];

        // ---------- পরিবর্তন: ১ দিন পিছিয়ে দেখান ----------
        function formatDateLabel(dateStr) {
            if (!dateStr) return '';
            const parts = dateStr.split('-');
            if (parts.length !== 3) return dateStr;
            // Parse as UTC
            const d = new Date(Date.UTC(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2])));
            // Subtract 1 day (ব্যবহার আগের দিনের)
            d.setUTCDate(d.getUTCDate() - 1);
            const month = d.getUTCMonth();
            const day = d.getUTCDate();
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            return months[month] + ' ' + String(day).padStart(2, '0');
        }
        // -------------------------------------------------

        function formatTime12(datetimeStr) {
            if (!datetimeStr) return 'N/A';
            const parts = datetimeStr.split(' ');
            if (parts.length < 2) return datetimeStr;
            const timeParts = parts[1].split(':');
            if (timeParts.length < 2) return datetimeStr;
            let hour = parseInt(timeParts[0], 10);
            const minute = timeParts[1];
            const ampm = hour >= 12 ? 'PM' : 'AM';
            hour = hour % 12 || 12;
            return hour + ':' + minute + ' ' + ampm;
        }

        function copyMeterNumber(meter) {
            navigator.clipboard.writeText(meter).then(() => {
                const btn = document.getElementById(`copy-btn-${meter}`);
                if (btn) {
                    const original = btn.innerHTML;
                    btn.innerHTML = '✓';
                    setTimeout(() => { btn.innerHTML = original; }, 1000);
                }
            }).catch(err => {
                console.error('Failed to copy: ', err);
            });
        }

        async function loadDashboard() {
            try {
                const [historyRes, configRes] = await Promise.all([
                    fetch(HISTORY_URL + CACHE_BUST),
                    fetch(CONFIG_URL + CACHE_BUST).catch(() => ({ ok: false }))
                ]);

                if (!historyRes.ok) throw new Error("History file not found");
                const fullData = await historyRes.json();

                let meterNames = {};
                if (configRes.ok) {
                    meterNames = await configRes.json();
                }

                const meterData = fullData.meter_data || {};
                const lastRun = fullData.last_run || {};

                const allRuns = Object.values(lastRun);
                if (allRuns.length > 0) {
                    allRuns.sort((a, b) => new Date(b) - new Date(a));
                    document.getElementById('globalUpdateTime').innerText = formatTime12(allRuns[0]) + ' (BD)';
                } else {
                    document.getElementById('globalUpdateTime').innerText = 'No runs yet';
                }

                const container = document.getElementById('cardContainer');
                container.innerHTML = '';

                const meterNumbers = Object.keys(meterData);
                if (meterNumbers.length === 0) {
                    container.innerHTML = '<div class="card" style="grid-column:1/-1; text-align:center; padding:40px;">⚠️ কোনো মিটার ডেটা পাওয়া যায়নি।</div>';
                    return;
                }

                const customOrder = [
                    "37005309", "37006814", "37001280", "37009693", "37005104", "37002391"
                ];
                meterNumbers.sort((a, b) => customOrder.indexOf(a) - customOrder.indexOf(b));

                meterNumbers.forEach((meter) => {
                    const history = meterData[meter] || [];
                    const displayName = meterNames[meter] || meter;
                    const lastEntry = history.length > 0 ? history[history.length - 1] : null;
                    const lastRunTime = lastRun[meter] || "N/A";

                    const last7 = history.slice(-7);
                    const labels = last7.map(d => formatDateLabel(d.balance_date || ''));
                    const usages = last7.map(d => d.usage || 0);
                    const latestBalance = lastEntry ? lastEntry.balance : 0;
                    const latestDate = lastEntry ? formatDateLabel(lastEntry.balance_date) : '--';
                    const latestUsage = lastEntry ? lastEntry.usage : 0;

                    const card = document.createElement('div');
                    card.className = 'card';
                    card.id = `card-${meter}`;

                    card.innerHTML = `
                        <div class="meter-header">
                            <span class="meter-title">${displayName}</span>
                            <span class="meter-number">
                                ${meter}
                                <button class="copy-btn" id="copy-btn-${meter}" onclick="copyMeterNumber('${meter}')" title="Copy meter number">📋</button>
                            </span>
                        </div>
                        <div class="balance-amount">৳ ${latestBalance.toFixed(2)}</div>
                        <div class="meta-row">
                            <span>📅 তারিখ: ${latestDate}</span>
                            <span class="usage-badge">সর্বশেষ খরচ: ৳ ${latestUsage.toFixed(2)}</span>
                        </div>
                        <div class="chart-container">
                            <canvas id="chart-${meter}"></canvas>
                        </div>
                        <div class="last-run-time">🕒 শেষ রান: ${formatTime12(lastRunTime)} (${lastRunTime.split(' ')[0]})</div>
                    `;

                    container.appendChild(card);

                    const ctx = document.getElementById(`chart-${meter}`).getContext('2d');

                    const chart = new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: labels,
                            datasets: [{
                                data: usages,
                                backgroundColor: '#4db8ff',
                                borderRadius: 4,
                                barPercentage: 0.6
                            }]
                        },
                        options: {
                            legend: { display: false },
                            responsive: true,
                            maintainAspectRatio: false,
                            layout: { padding: { top: 20 } },
                            tooltips: {
                                callbacks: {
                                    label: function(tooltipItem) {
                                        return '৳ ' + tooltipItem.yLabel.toFixed(2);
                                    }
                                }
                            },
                            scales: {
                                yAxes: [{
                                    ticks: {
                                        beginAtZero: true,
                                        maxTicksLimit: 4,
                                        fontColor: '#ccc',
                                        fontSize: 9
                                    },
                                    gridLines: { color: '#444', display: true }
                                }],
                                xAxes: [{
                                    ticks: {
                                        fontColor: '#eee',
                                        fontSize: 10,
                                        maxRotation: 30,
                                        minRotation: 0
                                    },
                                    gridLines: { display: false }
                                }]
                            },
                            plugins: {
                                datalabels: {
                                    anchor: 'end',
                                    align: 'end',
                                    color: '#eee',
                                    font: { size: 10, weight: 'bold' },
                                    formatter: function(value) {
                                        return '৳' + value.toFixed(1);
                                    },
                                    offset: 2
                                }
                            }
                        }
                    });

                    allCharts.push(chart);
                });

            } catch (error) {
                console.error(error);
                document.getElementById('cardContainer').innerHTML = `
                    <div class="card" style="grid-column:1/-1; text-align:center; padding:40px; color:#e74c3c;">
                        ❌ ডেটা লোড করা যায়নি। <br><small>${error.message}</small>
                    </div>
                `;
            }
        }

        window.onload = loadDashboard;
    </script>
</body>
</html>
